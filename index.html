<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>CTO-VIVO</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<!-- ══════════════════════════════════════
     TELA DE LOGIN
══════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">

    <div class="login-logo">
      <span class="icon">🗺</span>
      <h1>Mapa <span>CTO</span> Vivo</h1>
      <p>Faça login para acessar o mapa</p>
    </div>

    <!-- Botão Google -->
    <button class="btn-google" id="btn-google-login">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Entrar com Google
    </button>

    <div class="divider"><span>ou use email e senha</span></div>

    <div class="login-tabs">
      <button class="login-tab active" id="tab-login"    onclick="switchTab('login')">Entrar</button>
      <button class="login-tab"        id="tab-registro" onclick="switchTab('registro')">Criar conta</button>
    </div>

    <div class="auth-form">
      <input type="email"    id="auth-email" placeholder="Email"  autocomplete="email" />
      <input type="password" id="auth-senha" placeholder="Senha"  autocomplete="current-password" />
      <button class="btn-auth" id="btn-auth-submit">Entrar</button>
      <div class="auth-msg" id="auth-msg"></div>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════════
     APP (visível após login)
══════════════════════════════════════ -->
<div id="app">

  <div id="topbar">
    <div class="logo">🗺 Mapa <span>CTO</span> Vivo</div>
    <span class="badge" id="cto-count-badge">0 CTOs</span>
    <div class="user-info">
      <div class="user-avatar" id="user-avatar">?</div>
      <button id="btn-logout" title="Sair">Sair</button>
    </div>
  </div>

  <div id="map"></div>

  <div class="fab-group">
    <button class="fab" id="btn-add"       title="Nova CTO">＋</button>
    <button class="fab" id="btn-gps"       title="Minha localização">📍</button>
    <button class="fab" id="btn-lista"     title="Lista de CTOs">☰</button>
    <div id="admin-badge-wrap" style="display:none;position:relative">
      <button class="fab fab-admin" id="btn-pendentes" style="display:none" title="CTOs pendentes">⏳</button>
      <span id="pendentes-badge" class="pendentes-badge" style="display:none">0</span>
    </div>
  </div>

  <div id="hint">Toque no mapa ou use 📍 para registrar uma CTO</div>

  <div id="legenda">
    <div class="leg-title">Legenda</div>
    <div class="leg-row"><div class="leg-dot" style="background:#22c55e"></div> Ativa</div>
    <div class="leg-row"><div class="leg-dot" style="background:#f59e0b"></div> Em manutenção</div>
    <div class="leg-row"><div class="leg-dot" style="background:#ef4444"></div> Danificada</div>
    <div class="leg-row"><div class="leg-dot" style="background:#6b7280"></div> Desconhecida</div>
  </div>

  <div id="modal">
    <div id="modal-backdrop"></div>
    <div class="modal-card">
      <h2>Nova Caixa CTO</h2>
      <form id="form-cto">
        <div class="form-group">
          <label>Endereço</label>
          <div class="autocomplete-wrap">
            <input id="f-endereco" type="text" placeholder="Digite a rua para ver sugestões…" maxlength="120" autocomplete="off" />
            <div id="autocomplete-list" class="autocomplete-list"></div>
          </div>
          <div id="geocode-msg" class="geocode-msg"></div>
        </div>
        <div class="form-group">
          <label>Bairro <span class="label-auto">(preenchido automaticamente)</span></label>
          <input id="f-bairro" type="text" placeholder="Selecione um endereço acima" maxlength="80" />
        </div>
        <div class="form-group">
          <label>Área</label>
          <input id="f-area-cabo" type="text" placeholder="Ex: IPFH02" required maxlength="40" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>SP</label>
            <input id="f-sp" type="text" placeholder="Ex: 01" maxlength="20" />
          </div>
          <div class="form-group">
            <label>SEC</label>
            <input id="f-sec" type="text" placeholder="Ex: 01-08" maxlength="20" />
          </div>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="f-status">
            <option>Ativa</option>
            <option>Em manutenção</option>
            <option>Danificada</option>
            <option>Desconhecida</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="btn-cancelar">Cancelar</button>
          <button type="submit" class="btn-primary"   id="btn-salvar">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="painel">
    <div class="painel-header">
      <div>
        <h3>Caixas CTO cadastradas</h3>
        <div id="cto-count" style="font-size:12px;color:#93c5fd;margin-top:2px">0 CTOs</div>
      </div>
      <button id="btn-fechar-painel">✕</button>
    </div>
    <ul id="lista-ctos"></ul>
  </div>

  <!-- Painel admin: CTOs pendentes -->
  <div id="painel-admin">
    <div class="painel-header" style="background:linear-gradient(135deg,#78350f,#451a03)">
      <div>
        <h3>⏳ CTOs para análise</h3>
        <div style="font-size:12px;color:#fcd34d;margin-top:2px">Somente visível para você</div>
      </div>
      <button id="btn-fechar-admin">✕</button>
    </div>
    <ul id="lista-pendentes"></ul>
  </div>

</div>

<!-- Vite injeta o JS automaticamente como módulo -->
<script type="module" src="/app.js"></script>
</body>
</html>
